<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-labelledby="arc-hero-title arc-hero-desc" preserveAspectRatio="xMidYMid meet">
  <title id="arc-hero-title">Attestatie Registratie Component (ARC)</title>
  <desc id="arc-hero-desc">Gemeentelijke producten als rechtsgeldige attestaties in de EUDI-wallet. Een initiatief binnen Common Ground.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="55%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>

  <text x="600" y="148" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif" font-size="132" font-weight="900" fill="#0f172a" letter-spacing="-6">ARC</text>

  <text x="600" y="196" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif" font-size="24" font-weight="600" fill="#334155" letter-spacing="-0.2">Attestatie Registratie Component</text>

  <rect x="566" y="218" width="68" height="3" fill="url(#accent)"/>

  <text x="600" y="256" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif" font-size="17" font-weight="400" fill="#475569">Gemeentelijke producten als rechtsgeldige attestaties in de EUDI-wallet.</text>

  <g transform="translate(420, 280)">
    <rect width="360" height="32" rx="16" fill="rgba(2,132,199,0.1)" stroke="rgba(2,132,199,0.5)" stroke-width="1"/>
    <text x="180" y="21" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#0369a1" letter-spacing="1.6">EEN INITIATIEF BINNEN COMMON GROUND</text>
  </g>
</svg>
