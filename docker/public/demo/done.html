<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARC — Resultaat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f6f8;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e2e5ea;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: .6rem; }
    p  { color: #555; font-size: .95rem; margin-bottom: 1.5rem; }

    a {
      display: inline-block;
      color: #1a56db;
      font-size: .875rem;
      font-weight: 600;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" id="icon"></div>
    <h1 id="heading"></h1>
    <p id="body"></p>
    <a href="/">&#8592; Terug naar overzicht</a>
  </div>

  <script>
    const success = new URLSearchParams(window.location.search).get('status') === 'true';
    document.getElementById('icon').textContent    = success ? '✅' : '❌';
    document.getElementById('heading').textContent = success
      ? 'Attestatie toegevoegd'
      : 'Attestatie niet toegevoegd';
    document.getElementById('body').textContent = success
      ? 'De attestatie is succesvol toegevoegd aan uw digitale wallet.'
      : 'De attestatie kon niet worden toegevoegd. Probeer het opnieuw.';
  </script>
</body>
</html>
