<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attestatie Registratie</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f6f8;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e2e5ea;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .dot {
      display: inline-block;
      width: .65rem;
      height: .65rem;
      background: #22c55e;
      border-radius: 50%;
      margin-right: .4rem;
      vertical-align: middle;
    }

    h1  { font-size: 1.25rem; font-weight: 700; margin-bottom: .75rem; }
    p   { color: #555; font-size: .95rem; line-height: 1.5; }
    .status { margin-top: 1.25rem; font-size: .85rem; color: #444; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Attestatie Registratie Component</h1>
    <p>Deze service verwerkt het uitgeven van digitale attestaties aan ID-wallets.</p>
    <p class="status"><span class="dot"></span>Operationeel</p>
  </div>
</body>
</html>
